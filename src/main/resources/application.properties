spring.application.name=Biblioteca

# Configuracion de la base de datos PostgreSQL
# Importante: Estas variables usan las de entorno si existen (como en Render), sino los valores por defecto
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/biblioteca_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA y Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# FIX Para PostgreSQL con Enums:
spring.jpa.properties.hibernate.type.preferred_enum_jdbc_type=VARCHAR

# Thymeleaf
spring.thymeleaf.cache=false

# Configuracion de subida de archivos (Multipart)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.file-size-threshold=2KB

# Configuracion del servidor (Tomcat) para permitir POSTs grandes
server.tomcat.max-http-post-size=50MB
server.tomcat.max-swallow-size=50MB
