<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Usuario</title>
    <link rel="stylesheet" th:href="@{/css/forms.css}">
    <style>
        .icon-user::before {
            content: "👤";
            font-size: 40px;
        }
    </style>
</head>

<body>
    <div class="form-container">
        <div class="header">
            <div class="icon icon-user"></div>
            <h2>Editar Usuario</h2>
            <p class="subtitle">Modificar informacion del usuario</p>
        </div>

        <form th:action="@{/admin/usuarios/editar/{id}(id=${usuario.id})}" method="post">
            <div class="form-group">
                <label>👤 Nombre de Usuario</label>
                <input type="text" name="username" th:value="${usuario.username}" required>
            </div>

            <div class="form-group">
                <label>🔐 Nueva Contraseña (dejar en blanco para no cambiar)</label>
                <input type="password" name="nuevaPassword" placeholder="Solo si deseas cambiarla">
            </div>

            <div class="form-group">
                <label>🛡️ Rol</label>
                <select name="rol">
                    <option value="ROLE_USER" th:selected="${#lists.contains(usuario.roles, 'ROLE_USER')}">USUARIO
                    </option>
                    <option value="ROLE_ADMIN" th:selected="${#lists.contains(usuario.roles, 'ROLE_ADMIN')}">
                        ADMINISTRADOR</option>
                </select>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn-primary">Actualizar Usuario</button>
                <a th:href="@{/admin/usuarios-prestamos}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</body>

</html>
